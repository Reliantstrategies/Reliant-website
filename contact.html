<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Reliant Strategies</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo"><span class="logo-mark">↗</span><span><strong>RELIANT</strong><small>STRATEGIES</small></span></a>
    <nav aria-label="Main navigation">
      <a href="index.html">Home</a><a href="services.html">Services</a><a href="contact.html" class="active">Contact</a><a class="nav-btn" href="contact.html">Book a Consultation</a>
    </nav>
  </header>
  <main>
    <section class="contact-section reveal">
      <div class="contact-info">
        <p class="eyebrow">Contact</p>
        <h1>Let’s Build Something Great</h1>
        <p>We’d love to learn about your business and how we can help you grow.</p>
        <div class="contact-lines">
          <a href="tel:9093030265">☎ 909-303-0265</a>
          <a href="mailto:reliantstrategies@yahoo.com">✉ reliantstrategies@yahoo.com</a>
          <a href="https://instagram.com/reliantstrategies">◎ @reliantstrategies</a>
        </div>
      </div>
      <form class="contact-form" action="https://formsubmit.co/reliantstrategies@yahoo.com" method="POST">
        <input type="hidden" name="_subject" value="New Reliant Strategies Inquiry" />
        <input type="hidden" name="_captcha" value="false" />
        <label>Name<input name="name" type="text" required /></label>
        <label>Email<input name="email" type="email" required /></label>
        <label>Business Name<input name="business" type="text" /></label>
        <label>Phone<input name="phone" type="tel" /></label>
        <label class="full">Message<textarea name="message" rows="6" required></textarea></label>
        <button class="btn primary" type="submit">Send Inquiry →</button>
      </form>
    </section>
    <section class="map-card reveal" aria-label="Service area map"><div class="pin">📍 Southern California</div></section>
  </main>
  <a class="floating-text" href="sms:9093030265">💬 Text Us</a>
  <footer><p>© 2026 Reliant Strategies.</p></footer>
  <script src="script.js"></script>
</body>
</html>
